<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>France Flag</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            background-color: #222;
            font-family: Arial, sans-serif;
            color: #fff;
        }

        .flag {
            display: flex;
            width: 540px;
            height: 360px;
            border: 3px solid #000;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.3);
            background-color: #fff;
        }

        .flag__bar {
            flex: 1;
        }

        .flag__bar--blue {
            background-color: #0055A4;
        }

        .flag__bar--white {
            background-color: #fff;
        }

        .flag__bar--red {
            background-color: #EF4135;
        }

        h1 {
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            font-size: 1.2rem;
        }
    </style>
</head>
<body>
    <div>
        <h1>France Flag</h1>
        <div class="flag">
            <div class="flag__bar flag__bar--blue"></div>
            <div class="flag__bar flag__bar--white"></div>
            <div class="flag__bar flag__bar--red"></div>
        </div>
    </div>
</body>
</html>
